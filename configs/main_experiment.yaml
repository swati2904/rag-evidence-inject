# Main-scale run (300+300): same schema as pilot.yaml with larger caps
seed: 42
data:
  nq_max_train: 5000
  hotpot_max_train: 5000
  main_nq: 300
  main_hotpot: 300
  use_kilt_nq: true
retrieval:
  top_k: 5
  dense_model: "BAAI/bge-large-en-v1.5"
  hybrid_alpha: 0.5
generation:
  openai_base_url: "${OPENAI_BASE_URL:-http://127.0.0.1:8000/v1}"
  openai_api_key: "${OPENAI_API_KEY:-EMPTY}"
  model: "Qwen/Qwen2.5-7B-Instruct"
  max_tokens: 256
  temperature: 0.0
  use_hf_fallback: false
paths:
  data_dir: "data"
  logs_dir: "logs"
benchmark:
  poison_rank_candidates: [1, 3, 5]
  num_distractors: 6
logging:
  jsonl: true
  level: INFO
